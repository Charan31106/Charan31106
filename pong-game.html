<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background: black;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle and ball\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n        const player = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0,\n        };\n        const ai = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'red',\n            score: 0,\n        };\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            size: ballSize,\n            speed: 5,\n            dx: 5,\n            dy: 5,\n        };\n\n        // Draw function\n        function draw() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            context.fillStyle = player.color;\n            context.fillRect(player.x, player.y, player.width, player.height);\n            context.fillStyle = ai.color;\n            context.fillRect(ai.x, ai.y, ai.width, ai.height);\n            context.fillStyle = 'white';\n            context.fillRect(ball.x, ball.y, ball.size, ball.size);\n            context.font = '20px Arial';\n            context.fillText('Player: ' + player.score, 50, 30);\n            context.fillText('AI: ' + ai.score, canvas.width - 100, 30);\n        }\n\n        // Update function\n        function update() {\n            ball.x += ball.dx;\n            ball.y += ball.dy;\n            if (ball.y + ball.size > canvas.height || ball.y < 0) {\n                ball.dy *= -1;\n            }\n            if (ball.x < player.x + player.width && ball.y + ball.size > player.y && ball.y < player.y + player.height) {\n                ball.dx *= -1;\n            }\n            if (ball.x + ball.size > ai.x && ball.y + ball.size > ai.y && ball.y < ai.y + ai.height) {\n                ball.dx *= -1;\n            }\n            if (ball.x + ball.size < 0) {\n                ai.score++;\n                resetBall();\n            }\n            if (ball.x > canvas.width) {\n                player.score++;\n                resetBall();\n            }\n            ai.y += (ball.y - (ai.y + ai.height / 2)) * 0.1;\n        }\n\n        // Reset ball position and speed\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.dx = -ball.dx; // Change direction\n        }\n\n        // Game loop\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        // Control the player paddle\n        document.addEventListener('mousemove', (event) => {\n            const mouseY = event.clientY - canvas.getBoundingClientRect().top;\n            player.y = mouseY - player.height / 2;\n            if (player.y < 0) player.y = 0;\n            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;\n        });\n\n        // Start the game\n        gameLoop();\n    </script>\n</body>\n</html>
